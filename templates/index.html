<!DOCTYPE html>
<html>
<head>
    <title>Run Python Scripts</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }

        button {
            margin: 5px;
            padding: 10px 20px;
        }

        #output {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <h2>Run Local Python Files</h2>

    <button onclick="runScript('script1')">Run Script 1</button>
    <button onclick="runScript('script2')">Run Script 2</button>
    <button onclick="runScript('script3')">Run Script 3</button>

    <div id="output">Output will appear here...</div>

    <script>
        async function runScript(script) {
            const response = await fetch(`/run/${script}`);
            const data = await response.json();

            document.getElementById('output').textContent =
                data.output || 'No output';
        }
    </script>

</body>
</html>
